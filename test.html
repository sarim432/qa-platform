<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Assessment Platform - Powered by Claude AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0f1520;--surface2:#161d2e;--surface3:#1e2840;
  --border:#1f2d47;--border2:#2a3d5c;
  --accent:#3b82f6;--aglow:rgba(59,130,246,.15);
  --accent2:#10d9a0;--a2glow:rgba(16,217,160,.12);
  --warn:#f59e0b;--danger:#ef4444;--success:#10b981;
  --text:#e2e8f4;--text2:#8fa3c4;--text3:#4a6080;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
#app{min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.page{max-width:880px;margin:0 auto;padding:28px 20px 80px}
.page-narrow{max-width:520px;margin:0 auto;padding:28px 20px 80px}
.topbar{display:flex;align-items:center;gap:12px;padding:0 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-name{font-family:var(--display);font-size:18px;font-weight:700;color:var(--text)}
.brand-tag{font-size:11px;color:var(--text3);font-family:var(--mono)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin-bottom:18px; position:relative;}
.card-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap; justify-content: space-between;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-group{margin-bottom:16px}
.form-group:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono)}
input[type=text],input[type=email],input[type=password],textarea,select{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .2s,box-shadow .2s; cursor: pointer;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--aglow)}
textarea{min-height:100px;resize:vertical;line-height:1.6}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface2);color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--sans);white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#4f95ff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.35)}
.btn-success{background:var(--accent2);color:#061a12}
.btn-success:hover:not(:disabled){background:#17f0b2;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text3);border:none;padding:8px 12px;font-size:13px}
.btn-ghost:hover{color:var(--text)}
.btn-lg{padding:15px 32px;font-size:16px;border-radius:11px}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-loading{position:relative;color:transparent!important}
.btn-loading::after{content:'';position:absolute;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;font-family:var(--mono);white-space:nowrap}
.badge-blue{background:rgba(59,130,246,.18);color:#60a5fa}
.badge-green{background:rgba(16,185,129,.18);color:#34d399}
.badge-amber{background:rgba(245,158,11,.18);color:#fbbf24}
.badge-red{background:rgba(239,68,68,.18);color:#f87171}
.badge-teal{background:rgba(16,217,160,.18);color:var(--accent2)}
.badge-purple{background:rgba(139,92,246,.18);color:#a78bfa}
.badge-orange{background:rgba(249,115,22,.18);color:#fb923c}
.alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:16px;line-height:1.5}
.alert-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#34d399}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fbbf24}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.tabs{display:flex;gap:3px;background:var(--surface2);border-radius:11px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px 6px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--sans)}
.tab.active{background:var(--surface3);color:var(--text)}
.tab:hover:not(.active){color:var(--text2)}
.progress-track{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--surface2);border-radius:11px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat-num{font-family:var(--display);font-size:26px;font-weight:800;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.mcq-item{background:var(--surface2);border-radius:12px;padding:20px 22px;margin-bottom:14px;border:1px solid var(--border)}
.mcq-meta{font-size:11px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mcq-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;line-height:1.6}
.mcq-options{display:flex;flex-direction:column;gap:8px}
.mcq-opt{padding:11px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:10px;transition:all .15s;line-height:1.4}
.mcq-opt:hover{border-color:var(--accent);color:var(--text);background:var(--aglow)}
.mcq-opt.selected{border-color:var(--accent);background:var(--aglow);color:var(--text)}
.mcq-opt.correct{border-color:var(--success);background:rgba(16,185,129,.12);color:#34d399}
.mcq-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.1);color:#f87171}
.opt-letter{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.explanation{font-size:12px;color:var(--text3);margin-top:12px;padding:10px 14px;background:var(--surface);border-radius:7px;border-left:3px solid var(--accent);line-height:1.6}
.timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px;position:sticky;top:10px;z-index:10;backdrop-filter:blur(10px)}
.timer-display{font-size:20px;font-weight:600;color:var(--warn);font-family:var(--mono);min-width:60px}
.candidate-card{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface2);border-radius:11px;border:1px solid var(--border);margin-bottom:10px;flex-wrap:wrap}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;flex-shrink:0;font-family:var(--display)}
.email-tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text2);font-family:var(--mono)}
.email-tag button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:color .15s}
.email-tag button:hover{color:var(--danger)}
.email-tags-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:24px}
.diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
@media(max-width:500px){.diff-grid{grid-template-columns:1fr}}
.diff-card{border:2px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .18s;background:var(--surface2)}
.diff-card:hover{border-color:var(--border2);background:var(--surface3)}
.diff-card.sel{border-color:var(--accent);background:var(--aglow)}
.diff-card-title{font-size:13px;font-weight:700;color:var(--text);margin:6px 0 2px}
.diff-card-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.loading-wrap{text-align:center;padding:36px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.loading-label{font-size:14px;color:var(--accent);font-family:var(--mono)}
.score-ring{width:120px;height:120px;border-radius:50%;border:5px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:18px auto}
.score-big{font-family:var(--display);font-size:28px;font-weight:800;color:var(--accent);line-height:1}
.score-of{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.mark-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;font-family:var(--mono)}
.chip-green{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.chip-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.chip-gray{background:rgba(74,96,128,.15);color:var(--text3);border:1px solid var(--border)}
.link-box{background:var(--surface2);border:1px solid var(--accent);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.link-url{flex:1;font-size:12px;color:var(--accent2);font-family:var(--mono);word-break:break-all;line-height:1.5}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text3);font-size:12px;font-family:var(--mono)}
.info-val{color:var(--text);font-weight:500}
.hero{text-align:center;padding:60px 20px 40px}
.hero-eye{font-family:var(--mono);font-size:12px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.hero-title{font-family:var(--display);font-size:clamp(28px,6vw,50px);font-weight:800;color:var(--text);line-height:1.1;margin-bottom:18px}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:16px;color:var(--text2);max-width:480px;margin:0 auto 36px;line-height:1.7}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.025;background-image:linear-gradient(var(--text) 1px,transparent 1px),linear-gradient(90deg,var(--text) 1px,transparent 1px);background-size:50px 50px}
.rel{position:relative;z-index:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
code{background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:2px 7px;font-family:var(--mono);font-size:12px;color:var(--accent2)}

/* Dropzone Styles for Drag & Drop */
.dropzone {
    width: 100%; height: 44px; border: 1px dashed var(--border2); border-radius: 9px;
    display: flex; align-items: center; justify-content: center; position: relative;
    overflow: hidden; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500;
}
.dropzone:hover { border-color: var(--accent); background: var(--surface3); }
.dropzone input[type=file] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

/* MODAL FIXES - Allowing standard scrolling */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(8,12,20,0.85); backdrop-filter: blur(4px); z-index: 100; 
    overflow-y: auto; padding: 40px 20px;
}
.modal-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; 
    width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column;
}
.modal-header {
    padding: 20px 28px; border-bottom: 1px solid var(--border); 
    display: flex; justify-content: space-between; align-items: center; 
    background: var(--surface); z-index: 2; border-radius: 14px 14px 0 0;
}
.modal-body {
    padding: 28px;
}

/* Specific styling for the candidate block */
.candidate-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="rel" id="app"><div style="text-align:center;padding:80px 20px;color:#8fa3c4;font-family:'DM Sans',sans-serif">Loading…</div></div>

<script>
// GLOBAL DRAG & DROP BLOCKER (Prevents page refresh)
window.addEventListener("dragover", function(e) { e.preventDefault(); }, false);
window.addEventListener("drop", function(e) { e.preventDefault(); }, false);

// CONFIG
const CFG = {
  DEFAULT_ADMIN_PASSWORD: "QAAdmin2024"
};

function getAdminPass() { return localStorage.getItem('qa_admin_pass') || CFG.DEFAULT_ADMIN_PASSWORD; }

const TEMP_DOMAINS = ['mailinator.com', 'yopmail.com', 'tempmail.com', 'guerrillamail.com', '10minutemail.com', 'temp-mail.org', 'throwawaymail.com'];

const DIFF = {
  expert:       {label:"Subject Matter Expert", years:"20+ years",  badge:"badge-purple", color:"#a78bfa"},
  learned:      {label:"Learned Professional",  years:"15-19 years",badge:"badge-blue",   color:"#60a5fa"},
  knowledgeable:{label:"Knowledgeable",          years:"10-14 years",badge:"badge-teal",   color:"#10d9a0"},
  basic:        {label:"Basic",                  years:"< 5 years",  badge:"badge-green",  color:"#34d399"}
};
const DIFF_PROMPT = {
  expert:       "extremely challenging, expert-level questions testing deep mastery, edge cases, advanced failure analysis, regulatory interpretation, multi-system integration, and strategic QA leadership decisions that only a 20+ year seasoned professional would know",
  learned:      "advanced questions requiring thorough command of standards, complex audit scenarios, supplier system management, advanced statistical methods, and systemic quality thinking expected of a 15-19 year experienced professional",
  knowledgeable:"solid intermediate-to-advanced questions on practical QA ownership, tool proficiency (SPC, FMEA, MSA), process control, root cause methodologies, and cross-functional quality management for 10-14 years experience",
  basic:        "foundational questions on core QA/QC concepts, basic inspection methods, standard terminology, NCR/CAPA basics, and entry-level procedural knowledge for someone with under 5 years experience"
};

const MARKS = {correct:4, wrong:-1, skip:0};
const MAX_MARKS = 25 * 4;

let S = {
  view:'landing', adminTab:'create',
  candidates: JSON.parse(localStorage.getItem('qa_v3_cands')||'[]'),
  resultEmails: JSON.parse(localStorage.getItem('qa_v3_emails')||'[]'),
  activeTest:null, 
  form:{candidates:[{name:'', email:'', difficulty:'knowledgeable', resumeText:'', resumeFileName:''}], qapText:'', qapFileName:''},
  questions:[], answers:{}, submitted:false, elapsed:0,
  generating:false, genStep:'', genPct:0,
  mailStatus:'',
  reviewMode:false,
  adminPassInput:'', passErr:'',
  newEmailInput:'',
  viewCandidate: null, 
  previewTest: null,   
  newPassInput: '', confirmPassInput: '', passChangeMsg: '' 
};
let timerInt = null;

function save(){ localStorage.setItem('qa_v3_cands',JSON.stringify(S.candidates)); localStorage.setItem('qa_v3_emails',JSON.stringify(S.resultEmails)); }
function set(u,nr){ Object.assign(S,u); if(!nr) render(); }

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!re.test(email)) return "Invalid email format.";
  const domain = email.split('@')[1].toLowerCase();
  if (TEMP_DOMAINS.includes(domain)) return "Temporary/disposable emails are not allowed.";
  return null; 
}

async function extractTextFromPDF(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map(s => s.str).join(' ') + '\n';
    }
    return fullText;
  } catch (e) {
    console.error("PDF Extraction Error:", e);
    return "Error reading PDF. Please paste text manually.";
  }
}

async function handleQAPUpload(e) {
  const file = e.dataTransfer ? e.dataTransfer.files[0] : e.target.files[0];
  if (!file) return;
  S.form.qapFileName = file.name;
  S.form.qapText = 'Extracting PDF... Please wait.';
  render();
  const text = await extractTextFromPDF(file);
  S.form.qapText = text;
  render();
}

async function handleIndividualResumeUpload(e, candidateIndex) {
  const file = e.dataTransfer ? e.dataTransfer.files[0] : e.target.files[0];
  if (!file) return;
  S.form.candidates[candidateIndex].resumeFileName = file.name;
  S.form.candidates[candidateIndex].resumeText = 'Extracting PDF... Please wait.';
  render();
  const text = await extractTextFromPDF(file);
  S.form.candidates[candidateIndex].resumeText = text.trim();
  render();
}

function removeQAP(e) {
  e.stopPropagation();
  S.form.qapFileName = '';
  S.form.qapText = '';
  render();
}

function removeResume(e, candidateIndex) {
  e.stopPropagation();
  S.form.candidates[candidateIndex].resumeFileName = '';
  S.form.candidates[candidateIndex].resumeText = '';
  render();
}

async function sendCandidateEmail(c){
  try{
    const resp = await fetch('/send-email', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'candidate_invite', data:{
        to_name: c.name,
        to_email: c.email,
        test_link: c.link,
        expires_date: new Date(c.expires).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),
        difficulty: DIFF[c.difficulty]?.label||c.difficulty
      }})
    });
    return resp.ok;
  } catch(e){ console.error('sendCandidateEmail error:', e); return false; }
}

async function sendResultsEmails(c, sd){
  // Fetch result emails from server — works on any device, not just admin's browser
  let resultEmails = S.resultEmails;
  try {
    const cfgResp = await fetch('/config');
    if (cfgResp.ok) {
      const cfgData = await cfgResp.json();
      if (cfgData.resultEmails && cfgData.resultEmails.length) {
        resultEmails = cfgData.resultEmails;
      }
    }
  } catch(e) { console.warn('Could not fetch config from server, using local list:', e.message); }

  if(!resultEmails.length) return false;
  try{
    const resp = await fetch('/send-email', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'results', data:{
        result_emails: resultEmails,
        candidate_name: c.name,
        candidate_email: c.email,
        difficulty: DIFF[c.difficulty]?.label||c.difficulty,
        score_marks: sd.marks+' / '+MAX_MARKS,
        score_pct: sd.pct,
        correct: sd.correct,
        wrong: sd.wrong,
        skipped: sd.skipped,
        time_taken: sd.timeTaken,
        date: new Date().toLocaleString('en-IN'),
        breakdown: sd.breakdown
      }})
    });
    return resp.ok;
  } catch(e){ console.error('sendResultsEmails error:', e); return false; }
}

function calcScore(qs,answers){
  let correct=0,wrong=0,skipped=0,marks=0;
  const lines = qs.map((q,i)=>{
    const a=answers[i];
    if(a===undefined||a===null){ skipped++; return `Q${i+1}: SKIPPED (0) | ${q.question.slice(0,50)}...`; }
    if(a===q.correct){ correct++; marks+=4; return `Q${i+1}: ✓ CORRECT (+4) | ${q.question.slice(0,50)}...`; }
    wrong++; marks-=1;
    return `Q${i+1}: ✗ WRONG (-1) | ${q.question.slice(0,50)}... | Your: ${q.options[a]?.slice(0,30)} | Correct: ${q.options[q.correct]?.slice(0,30)}`;
  });
  return {correct,wrong,skipped,marks,pct:Math.max(0,Math.round(marks/MAX_MARKS*100)),breakdown:lines.join('\n'),timeTaken:fmt(S.elapsed)};
}

async function fetchWithRetry(prompt, maxRetries = 3) {
  let delay = 5000;
  for (let i = 0; i < maxRetries; i++) {
    try {
      const response = await fetch("/api", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "gemini-2.0-flash",
          max_tokens: 8000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      if (!response.ok || data.error) {
        const errMsg = data.error?.message || "API Error";
        if (response.status === 429 || response.status === 529) throw new Error("429");
        throw new Error(errMsg);
      }
      return data;
    } catch (e) {
      if (e.message === "429") {
        console.warn(`API Limit Hit. Pausing for ${delay/1000}s... (Attempt ${i+1}/${maxRetries})`);
        await new Promise(r => setTimeout(r, delay));
        delay *= 2;
      } else {
        throw e;
      }
    }
  }
  throw new Error("API limit reached. Please wait a moment and try again.");
}

async function generate(){
  const {candidates, qapText} = S.form;

  if (candidates.length === 0) return alert('Please add at least one candidate.');
  for (let i = 0; i < candidates.length; i++) {
    const c = candidates[i];
    if (!c.name || !c.email) return alert(`Candidate #${i+1} is missing a name or email.`);
    const emailError = validateEmail(c.email);
    if (emailError) return alert(`Candidate #${i+1} (${c.email}): ${emailError}`);
  }

  if(!S.resultEmails.length) return alert('Please add at least one Result Email in the ⚙️ Settings tab first.');
  const qap=qapText.trim()||DEMO_QAP;
  set({generating:true,genStep:'Initializing generation…',genPct:5,questions:[]});

  const upd=(s,p)=>{ S.genStep=s;S.genPct=p; const el=document.getElementById('gl'); if(el) el.textContent=s; const bar=document.getElementById('gb'); if(bar) bar.style.width=p+'%'; };

  try{
    let allGeneratedQs = [];
    let lastInviteSuccess = false;

    for (let i = 0; i < candidates.length; i++) {
        const c = candidates[i];
        const resText = c.resumeText.trim() || DEMO_RESUME; 

        const basePct = 5 + (90 * (i / candidates.length));
        const nextPct = 5 + (90 * ((i + 1) / candidates.length));
        const seed = Math.random().toString(36).substring(7);

        upd(`Generating 25 questions for ${c.name} via Claude…`, basePct + ((nextPct-basePct)*0.4));

        const prompt = `You are a QA examination expert. Generate exactly 25 MCQ questions in a JSON array.
        Difficulty: ${DIFF_PROMPT[c.difficulty]}

        SOURCE MATERIAL 1 (QAP):
        ${qap.slice(0,2500)}

        SOURCE MATERIAL 2 (Candidate Resume):
        ${resText.slice(0,2000)}

        RULES:
        - 4 options per question, exactly ONE correct (use 0-based index in "correct" field).
        - Keep questions relatively short and concise for quick reading.
        - Options MUST be clearly distinct from each other with no overlapping meaning.
        - Include brief explanation for correct answer.
        - Generate exactly 19 questions based on Source Material 1 (QAP).
        - Generate exactly 6 questions based on Source Material 2 (Candidate Resume).
        - IMPORTANT: Make these questions unique. Seed: ${seed}
        - Return ONLY a valid JSON array. No markdown, no code fences, no backticks, no explanation before or after. Start your response with [ and end with ].

        FORMAT:
        [
          {"type":"qap", "question":"...", "options":["A. ...","B. ...","C. ...","D. ..."], "correct":0, "explanation":"..."},
          {"type":"resume", "question":"...", "options":["A. ...","B. ...","C. ...","D. ..."], "correct":2, "explanation":"..."}
        ]`;

        const r1 = await fetchWithRetry(prompt);
        const t1 = r1.content[0].text;

        function extractAndRepairJSON(raw) {
          const fenceMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
          let s = fenceMatch ? fenceMatch[1].trim() : raw.trim();
          const start = s.indexOf('[');
          if (start === -1) throw new Error("No JSON array found in response");
          s = s.slice(start);
          let depth = 0, end = -1;
          for (let i = 0; i < s.length; i++) {
            if (s[i] === '[') depth++;
            else if (s[i] === ']') { depth--; if (depth === 0) { end = i; break; } }
          }
          if (end !== -1) {
            return JSON.parse(s.slice(0, end + 1));
          }
          const items = [];
          const re = /\{[\s\S]*?\}(?=\s*[,\]]|\s*$)/g;
          let m;
          while ((m = re.exec(s)) !== null) {
            try { items.push(JSON.parse(m[0])); } catch(e) { }
          }
          if (items.length < 10) throw new Error(`Only ${items.length} questions recovered — response was too short. Please try again.`);
          return items;
        }

        let allQs = extractAndRepairJSON(t1).slice(0, 25);
        allQs = allQs.map((q, idx) => ({...q, id: idx + 1}));
        allGeneratedQs = allQs;

        upd(`Creating test link for ${c.name}…`, basePct + ((nextPct-basePct)*0.8));

        const expires=Date.now()+3*24*60*60*1000;
        const cid = Date.now().toString(36) + Math.random().toString(36).substring(2, 5);

        // Always use the server's own origin — works correctly on Railway for all networks
        const baseUrl = window.location.origin.replace(/\/$/, '');
        const link = baseUrl + '/?test=' + cid;

        const candData = {
            id: cid, name: c.name, email: c.email, testName: `${c.name}'s Assessment`, 
            qapText: qap, resumeText: resText, difficulty: c.difficulty, questions: allQs, link, expires, 
            status: 'Pending', createdAt: new Date().toLocaleDateString('en-IN'), 
            score: null, marks: null, timeTaken: null, finalAnswers: {}
        };

        try {
          await fetch('/store', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(candData) });
        } catch(e) { console.error('Failed to save to server store:', e); }

        S.candidates.unshift(candData);
        localStorage.setItem('qa_test_' + cid, JSON.stringify(candData));

        upd(`Sending invite to ${c.name}…`, basePct + ((nextPct-basePct)*0.95));

        save();

        lastInviteSuccess = false; // reset per candidate
        const mailSuccess = await sendCandidateEmail(candData);
        lastInviteSuccess = mailSuccess;
        if (!mailSuccess) {
          console.error(`Failed to send invite to ${c.email}`);
        }

        if (i < candidates.length - 1) {
            upd(`Preparing next candidate…`, nextPct);
            await new Promise(r => setTimeout(r, 2000));
        }
    }

    set({
        generating: false, genStep: 'Done', genPct: 100, questions: allGeneratedQs,
        adminTab: 'generated', mailStatus: lastInviteSuccess ? 'sent' : 'not_configured',
        form: {...S.form, candidates: [{name:'', email:'', difficulty: 'knowledgeable', resumeText: '', resumeFileName: ''}]}
    });
  } catch(e) { 
      save(); 
      set({generating:false, genStep:'Error: '+e.message, genPct:0}); 
      console.error(e); 
  }
}

async function submitTest(){
  if(!S.activeTest) return;
  clearInterval(timerInt); timerInt=null;
  const sd=calcScore(S.activeTest.questions,S.answers);

  const updatedCandidate = {...S.activeTest, status:'Completed', score:sd.pct, marks:sd.marks, timeTaken:sd.timeTaken, finalAnswers: S.answers};

  S.candidates=S.candidates.map(c=>c.id===S.activeTest.id?updatedCandidate:c);
  localStorage.setItem('qa_test_'+S.activeTest.id,JSON.stringify(updatedCandidate));
  try {
    await fetch('/store/update', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(updatedCandidate) });
  } catch(e) { console.error('Could not sync result to server:', e); }
  save(); set({submitted:true,mailStatus:'sending'});
  const sent=await sendResultsEmails(S.activeTest,sd);
  set({mailStatus:sent?'sent':'not_configured'});
}

// FIX: Server-first lookup so candidates on any device/network can open links
async function checkURL(){
  const p=new URLSearchParams(window.location.search),tid=p.get('test');
  if(!tid) return false;

  let c = null;

  // 1. Try SERVER first (works for candidates on any device/network)
  try{
    const resp = await fetch('/store?id='+tid);
    if(resp.ok){ 
      c = await resp.json(); 
      console.log('[checkURL] Loaded from server store:', c.name);
    }
  }catch(e){ 
    console.warn('[checkURL] Server store failed:', e.message); 
  }

  // 2. Fallback to localStorage (for admin's own browser)
  if(!c){
    const raw = localStorage.getItem('qa_test_'+tid);
    if(raw){ 
      try{ 
        c=JSON.parse(raw); 
        console.log('[checkURL] Loaded from localStorage');
      }catch(e){} 
    }
  }

  if(!c){ set({view:'expired'}); return true; }
  if(Date.now()>c.expires){ set({view:'expired'}); return true; }
  if(c.status==='Completed'){ set({view:'already_done'}); return true; }

  S.activeTest=c; S.answers={}; S.submitted=false; S.elapsed=0; S.reviewMode=false;
  set({view:'candidate'}); startTimer(); return true;
}

function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className') el.className=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!=null&&v!==false) el.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(c=>{ if(c==null||c===false) return; el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c); });
  return el;
}

function buildCandidates(){
  if(!S.candidates.length) return h('div',{className:'card',style:{textAlign:'center',padding:'48px 28px'}},h('div',{style:{fontSize:48,marginBottom:16}},'👥'),h('p',{style:{color:'var(--text3)'}},'No candidates yet.'));

  const sortedCandidates = [...S.candidates].sort((a, b) => {
      const scoreA = a.score !== null ? a.score : -1;
      const scoreB = b.score !== null ? b.score : -1;
      return scoreB - scoreA;
  });

  return h('div',{},
    ...sortedCandidates.map(c=>{
      const d=DIFF[c.difficulty];
      const isComplete = c.status === 'Completed';
      const passed = c.score >= 35;

      return h('div',{className:'candidate-card'},
        h('div',{className:'avatar'},c.name?.charAt(0)?.toUpperCase()||'?'),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:14,color:'var(--text)'}},c.name),
          h('div',{style:{fontSize:12,color:'var(--text3)'}},c.email+' · '+c.createdAt)
        ),
        d?h('span',{className:'badge '+d.badge,style:{flexShrink:0}},d.label):null,
        c.marks!=null?h('div',{style:{textAlign:'right',flexShrink:0}},
          h('div',{style:{fontSize:14,fontWeight:700,color:'var(--accent)'}},c.marks+'/'+MAX_MARKS+' marks'),
          h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}},c.score+'% · '+c.timeTaken)
        ):null,
        h('div', {style:{display:'flex', gap:'6px', alignItems:'center', flexShrink:0}},
            h('span',{className:'badge '+(isComplete?'badge-green':'badge-amber')},c.status),
            isComplete ? h('span',{className:'badge '+(passed?'badge-green':'badge-red')}, passed ? 'PASS' : 'FAIL') : null
        ),
        isComplete 
          ? h('button',{className:'btn btn-primary btn-sm',style:{flexShrink:0},onClick:()=>set({viewCandidate: c})},'📊 View Details')
          : h('button',{className:'btn btn-outline btn-sm',style:{flexShrink:0},onClick:()=>{navigator.clipboard?.writeText(c.link);alert('Link copied for '+c.name)}},'🔗 Copy Link')
      );

    S.viewCandidate ? buildCandidateDetailsModal(S.viewCandidate) : null

function addEmail(){
  const v=(S.newEmailInput||'').trim().toLowerCase();
  const err = validateEmail(v);
  if(err) return alert(err);
  if(S.resultEmails.includes(v)) return alert('This email is already in the list.');
  S.resultEmails.push(v); S.newEmailInput=''; save();
  syncResultEmailsToServer();
  render();
}
function removeEmail(em){ S.resultEmails=S.resultEmails.filter(e=>e!==em); save(); syncResultEmailsToServer(); render(); }

function syncResultEmailsToServer(){
  fetch('/config', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ resultEmails: S.resultEmails })
  }).catch(e => console.warn('Could not sync emails to server:', e.message));
}

function buildResults(qs){
  const sd=calcScore(qs,S.answers);
  const passed = sd.pct >= 35;
  const grade = passed ? (sd.pct>=80?'Excellent':sd.pct>=60?'Good':'Pass') : 'Fail (< 35%)';
  const gc = sd.pct>=80?'var(--success)':sd.pct>=60?'var(--accent2)':sd.pct>=35?'var(--warn)':'var(--danger)';
  const d=DIFF[S.activeTest?.difficulty];
  return h('div',{className:'page-narrow fade-in',style:{paddingTop:40}},
    h('div',{className:'card',style:{textAlign:'center',padding:'36px 28px'}},
      h('div',{style:{fontSize:44,marginBottom:12}},passed?(sd.pct>=60?'🎉':'📋'):'❌'),

      h('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:20}},grade),
      h('div',{className:'card',style:{textAlign:'left',padding:'14px 18px',marginBottom:16}},
        h('div',{className:'info-row'},h('span',{className:'info-label'},'Correct'),h('span',{style:{color:'var(--success)',fontWeight:600}},sd.correct+' × +4 = +'+(sd.correct*4)+' marks')),
        h('div',{className:'info-row'},h('span',{className:'info-label'},'Wrong'),h('span',{style:{color:'var(--danger)',fontWeight:600}},sd.wrong+' × -1 = -'+sd.wrong+' mark'+(sd.wrong!==1?'s':''))),
